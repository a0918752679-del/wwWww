<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>後台｜萬萬沒想到</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body{background:#f8fafc}.admin-layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{background:#0f172a;color:#fff;padding:20px;position:sticky;top:0;height:100vh}.side h1{font-size:22px}.side a{display:block;padding:12px 14px;border-radius:14px;text-decoration:none;color:#cbd5e1;font-weight:900}.side a:hover{background:#1e293b;color:#fff}.admin-main{padding:24px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{background:#fff;border-radius:24px;padding:18px;box-shadow:0 12px 34px rgba(15,23,42,.06);border:1px solid #e2e8f0}.stat b{font-size:28px}.panel{background:#fff;border:1px solid #e2e8f0;border-radius:28px;padding:18px;margin-top:18px;box-shadow:0 12px 34px rgba(15,23,42,.06)}.table-wrap{overflow:auto}.admin-table{width:100%;border-collapse:separate;border-spacing:0 10px;min-width:820px}.admin-table td,.admin-table th{text-align:left;padding:12px;background:#f8fafc}.admin-table th{font-size:13px;color:#64748b}.admin-table td:first-child,.admin-table th:first-child{border-radius:16px 0 0 16px}.admin-table td:last-child,.admin-table th:last-child{border-radius:0 16px 16px 0}.product-thumb{width:72px;height:54px;object-fit:cover;border-radius:14px;background:#e2e8f0}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.login-screen{min-height:100vh;display:grid;place-items:center;padding:18px}.login-card{max-width:420px;width:100%;background:#fff;border-radius:32px;padding:24px;box-shadow:var(--shadow)}@media(max-width:860px){.admin-layout{grid-template-columns:1fr}.side{height:auto;position:relative}.side nav{display:flex;overflow:auto;gap:8px}.side a{white-space:nowrap}.cards{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.admin-main{padding:16px}}@media(max-width:540px){.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="logo"><span class="logo-badge">萬</span><span>後台管理</span></div>
      <h1>內部人員登入</h1>
      <p class="notice">輸入 ADMIN_PASSWORD 後可以上架、下架商品、確認銀行匯款與查看今日紀錄。</p>
      <form id="adminLoginForm">
        <div class="field"><label>後台密碼</label><input class="input" name="password" type="password" required /></div>
        <button class="btn primary" style="width:100%">登入後台</button>
      </form>
    </div>
  </div>

  <div id="adminApp" class="admin-layout" style="display:none">
    <aside class="side">
      <h1>萬萬沒想到</h1>
      <nav>
        <a href="#dashboard">Dashboard</a>
        <a href="#products">商品上下架</a>
        <a href="#orders">匯款確認</a>
        <a href="/" target="_blank">前台</a>
      </nav>
      <button class="btn ghost" onclick="admin.logout()" style="margin-top:18px;width:100%">登出</button>
    </aside>
    <main class="admin-main">
      <section id="dashboard">
        <div class="section-head"><div><h2>營運總覽</h2><p>今天訂單、待確認付款、商品庫存與營收。</p></div><button class="btn ghost" onclick="admin.refreshAll()">重新整理</button></div>
        <div id="stats" class="cards"></div>
      </section>

      <section id="products" class="panel">
        <div class="section-head"><div><h2>商品上下架</h2><p>內部人員可新增商品、補庫存、上架與下架。上架商品會顯示在客人前台。</p></div></div>
        <form id="productForm">
          <input type="hidden" name="id" />
          <div class="form-grid">
            <div class="field"><label>商品名稱</label><input class="input" name="title" required /></div>
            <div class="field"><label>分類</label><input class="input" name="category" value="戰鬥陀螺" /></div>
            <div class="field"><label>售價</label><input class="input" name="price" type="number" min="1" required /></div>
            <div class="field"><label>庫存</label><input class="input" name="stock" type="number" min="0" required /></div>
            <div class="field"><label>狀態</label><select name="status"><option value="draft">草稿 / 下架</option><option value="active">上架</option><option value="soldout">售完</option><option value="archived">封存</option></select></div>
            <div class="field"><label>商品圖片 URL</label><input class="input" name="imageUrl" placeholder="/assets/products/placeholder.svg 或圖片網址" /></div>
          </div>
          <div class="field"><label>商品說明</label><textarea name="description"></textarea></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary">儲存商品</button><button type="button" class="btn ghost" onclick="admin.resetForm()">清空</button></div>
        </form>
        <div class="table-wrap"><table class="admin-table"><thead><tr><th>商品</th><th>價格</th><th>庫存</th><th>狀態</th><th>操作</th></tr></thead><tbody id="productRows"></tbody></table></div>
      </section>

      <section id="orders" class="panel">
        <div class="section-head"><div><h2>銀行匯款確認</h2><p>客人送出匯款資料後，內部人員確認入帳。取消訂單會釋放保留庫存。</p></div></div>
        <div class="table-wrap"><table class="admin-table"><thead><tr><th>訂單</th><th>會員</th><th>商品</th><th>匯款資料</th><th>狀態</th><th>操作</th></tr></thead><tbody id="orderRows"></tbody></table></div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/admin.js"></script>
</body>
</html>
